name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Fix sdkmanager path
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf \
            /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer==1.5.0

      - name: Clone p4a dan patch KEDUA recipe ke Python 3.11.9
        run: |
          mkdir -p .buildozer/android/platform
          git clone -b master --single-branch \
            https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android

          # ── Patch recipe hostpython3 ──────────────────────────────
          RECIPE_HOST=.buildozer/android/platform/python-for-android/pythonforandroid/recipes/hostpython3/__init__.py
          echo "=== hostpython3 SEBELUM patch ==="
          grep -n "version\|url" "$RECIPE_HOST" | head -10

          python3 << 'PYEOF'
          import re, sys

          path = ".buildozer/android/platform/python-for-android/pythonforandroid/recipes/hostpython3/__init__.py"
          content = open(path).read()

          # Ganti versi
          content = re.sub(r"version\s*=\s*['\"]3\.\d+\.\d+['\"]", "version = \"3.11.9\"", content)
          # Ganti URL download
          content = re.sub(
              r"https://github\.com/python/cpython/archive/refs/tags/v[\d\.]+\.tar\.gz",
              "https://github.com/python/cpython/archive/refs/tags/v3.11.9.tar.gz",
              content
          )

          open(path, 'w').write(content)
          print("hostpython3 berhasil dipatch")
          PYEOF

          echo "=== hostpython3 SETELAH patch ==="
          grep -n "version\|url" "$RECIPE_HOST" | head -10

          # ── Patch recipe python3 ──────────────────────────────────
          RECIPE_PY3=.buildozer/android/platform/python-for-android/pythonforandroid/recipes/python3/__init__.py
          echo "=== python3 SEBELUM patch ==="
          grep -n "version\|url" "$RECIPE_PY3" | head -10

          python3 << 'PYEOF'
          import re, sys

          path = ".buildozer/android/platform/python-for-android/pythonforandroid/recipes/python3/__init__.py"
          content = open(path).read()

          # Ganti versi
          content = re.sub(r"version\s*=\s*['\"]3\.\d+\.\d+['\"]", "version = \"3.11.9\"", content)
          # Ganti URL download
          content = re.sub(
              r"https://github\.com/python/cpython/archive/refs/tags/v[\d\.]+\.tar\.gz",
              "https://github.com/python/cpython/archive/refs/tags/v3.11.9.tar.gz",
              content
          )
          # Ganti checksum jika ada (hapus agar tidak mismatch)
          content = re.sub(r"md5sum\s*=\s*['\"][a-f0-9]+['\"]", "md5sum = None", content)
          content = re.sub(r"sha512sum\s*=\s*['\"][a-f0-9]+['\"]", "sha512sum = None", content)

          open(path, 'w').write(content)
          print("python3 berhasil dipatch")
          PYEOF

          echo "=== python3 SETELAH patch ==="
          grep -n "version\|url\|md5\|sha" "$RECIPE_PY3" | head -10

      - name: Build APK
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
        run: |
          buildozer -v android debug 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload log if failed
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tapfusion-calibrator-apk
          path: bin/*.apk
          retention-days: 30
