name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer==1.5.0

      - name: Build APK
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
        run: |
          buildozer -v android debug 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload log if failed
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tapfusion-calibrator-apk
          path: bin/*.apk
          retention-days: 30
