name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      # Java 17 wajib untuk Android SDK modern
      - name: Setup Java 17
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      # Python 3.11 - versi paling stabil untuk Kivy + Buildozer
      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev build-essential

      # sdkmanager di runner GitHub ada di cmdline-tools/latest/
      # tapi Buildozer mencarinya di tools/bin/ (path lama) — buat symlink
      - name: Fix sdkmanager path
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          sudo ln -sf \
            /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            /usr/local/lib/android/sdk/tools/bin/sdkmanager
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            --licenses 2>/dev/null || true

      # Cython 0.29.x - versi terakhir yang TIDAK bergantung pada modul 'cgi'
      # Buildozer 1.5.0 - versi stabil terakhir yang teruji dengan p4a 2023.9.16
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "Cython==0.29.37"
          pip install "buildozer==1.5.0"

      # Kunci p4a ke tag v2023.9.16 yang memakai Python 3.11 untuk hostpython3
      # p4a master terbaru memakai Python 3.14 yang sudah tidak punya modul 'cgi'
      - name: Pin python-for-android ke v2023.9.16
        run: |
          mkdir -p .buildozer/android/platform
          git clone \
            --depth 1 \
            --branch v2023.9.16 \
            https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android

          echo "=== Versi p4a yang dipakai ==="
          cat .buildozer/android/platform/python-for-android/CHANGELOG.md \
            | head -5 || true

          echo "=== Versi hostpython3 di p4a ini ==="
          grep -m1 "version" \
            .buildozer/android/platform/python-for-android/pythonforandroid/recipes/hostpython3/__init__.py \
            || true

      - name: Build APK
        env:
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/25.2.9519653
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
        run: |
          buildozer -v android debug 2>&1 | tee build_log.txt
          exit ${PIPESTATUS[0]}

      - name: Upload log jika gagal
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tapfusion-calibrator-apk
          path: bin/*.apk
          retention-days: 30
